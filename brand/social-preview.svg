<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <!-- Brand-authentic gradients -->
    <radialGradient id="ambient" cx="0.25" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient2" cx="0.85" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="30%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8898AA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <style>
      .title  { font-family: 'Space Grotesk', 'SF Pro Display', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.035em; }
      .body   { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 400; letter-spacing: -0.01em; }
      .mono   { font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Base background (EquiVault dark) -->
  <rect width="1280" height="640" fill="#030712"/>

  <!-- Ambient glows in brand colors -->
  <rect width="1280" height="640" fill="url(#ambient)"/>
  <rect width="1280" height="640" fill="url(#ambient2)"/>

  <!-- Subtle grid texture (matches docs/brand styling) -->
  <g stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280 M0 320 H1280 M0 400 H1280 M0 480 H1280 M0 560 H1280"/>
    <path d="M160 0 V640 M320 0 V640 M480 0 V640 M640 0 V640 M800 0 V640 M960 0 V640 M1120 0 V640"/>
  </g>

  <!-- LEFT: Official EquiVault mark on indigo tile -->
  <g transform="translate(130 180)">
    <!-- Brand-colored tile (same as favicon.svg proportions) -->
    <rect width="280" height="280" rx="64" fill="#4F46E5"/>

    <!-- Subtle inner highlight -->
    <rect x="1" y="1" width="278" height="278" rx="63" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>

    <!-- Official polyline mark scaled 3.5x -->
    <g transform="translate(0 0) scale(3.5)">
      <polyline points="16,58 30,44 40,50 64,22"
                fill="none" stroke="#FBBF24" stroke-width="5.5"
                stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="64" cy="22" r="5" fill="#FBBF24"/>
    </g>
  </g>

  <!-- RIGHT: Text block -->
  <g transform="translate(480 205)">
    <!-- Eyebrow tag (matches docs/brand eyebrow style) -->
    <g>
      <rect x="0" y="0" width="196" height="30" rx="6" fill="#4F46E5" fill-opacity="0.12" stroke="#818CF8" stroke-opacity="0.35" stroke-width="1"/>
      <circle cx="16" cy="15" r="3.5" fill="#FBBF24"/>
      <text x="30" y="20" class="mono" font-size="11" fill="#818CF8">MCP · OPEN SOURCE</text>
    </g>

    <!-- Title: wordmark style -->
    <text x="0" y="108" class="title" font-size="76" fill="url(#titleGrad)">equivault-mcp</text>

    <!-- Subtitle -->
    <text x="0" y="156" class="body" font-size="22" fill="#8898AA">
      AI-powered equity research tools for Claude —
    </text>
    <text x="0" y="186" class="body" font-size="22" fill="#8898AA">
      company data, financials, screening &amp; more.
    </text>

    <!-- Feature strip -->
    <g transform="translate(0 250)">
      <text x="0" y="0" class="mono" font-size="12" fill="#4F5B76">8 TOOLS · TYPESCRIPT · MIT</text>
      <line x1="0" y1="12" x2="320" y2="12" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
    </g>
  </g>

  <!-- Corner: github url -->
  <text x="1150" y="598" class="mono" font-size="11" fill="#3C4257" text-anchor="end">github.com/equivault</text>

  <!-- Top accent line -->
  <line x1="0" y1="0" x2="1280" y2="0" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.5"/>
</svg>
