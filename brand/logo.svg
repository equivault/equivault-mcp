<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="55%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="hexStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow behind mark -->
  <circle cx="128" cy="128" r="110" fill="url(#glow)"/>

  <!-- Hexagon frame -->
  <path d="M128 28 L216 80 L216 176 L128 228 L40 176 L40 80 Z"
        stroke="url(#hexStroke)" stroke-width="4" stroke-linejoin="round"
        fill="#0F172A" fill-opacity="0.65"/>

  <!-- Inner subtle hex accent -->
  <path d="M128 48 L198 89 L198 167 L128 208 L58 167 L58 89 Z"
        stroke="#F8FAFC" stroke-opacity="0.06" stroke-width="1" fill="none"/>

  <!-- "E"-shaped ascending chart bars (trust → AI gradient) -->
  <!-- Top bar (short) -->
  <rect x="80" y="84" width="68" height="14" rx="3" fill="url(#brand)"/>
  <!-- Middle bar (medium, shorter stub) -->
  <rect x="80" y="121" width="54" height="14" rx="3" fill="url(#brand)"/>
  <!-- Bottom bar (long, full width) -->
  <rect x="80" y="158" width="96" height="14" rx="3" fill="url(#brand)"/>

  <!-- Left vertical spine connecting the E -->
  <rect x="80" y="84" width="14" height="88" rx="3" fill="url(#brand)"/>

  <!-- Trend dot — top-right accent (stock mark) -->
  <circle cx="186" cy="91" r="6" fill="#FBBF24"/>
  <circle cx="186" cy="91" r="6" fill="none" stroke="#F8FAFC" stroke-opacity="0.4" stroke-width="1"/>
</svg>
