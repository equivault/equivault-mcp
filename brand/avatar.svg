<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background: official EquiVault indigo -->
  <rect width="400" height="400" rx="90" fill="#4F46E5"/>

  <!-- Official EquiVault chart mark, scaled up and centered.
       Source polyline from docs/brand/assets/icon.svg: 16,58 → 30,44 → 40,50 → 64,22 on 80×80 grid -->
  <g transform="translate(20 20) scale(4.5)">
    <polyline
      points="16,58 30,44 40,50 64,22"
      fill="none"
      stroke="#FBBF24"
      stroke-width="5.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <circle cx="64" cy="22" r="5" fill="#FBBF24"/>
  </g>
</svg>
