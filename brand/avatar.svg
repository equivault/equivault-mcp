<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="55%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="hexStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="400" height="400" rx="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture (faint) -->
  <g stroke="#F8FAFC" stroke-opacity="0.025" stroke-width="1">
    <path d="M0 100 H400 M0 200 H400 M0 300 H400 M100 0 V400 M200 0 V400 M300 0 V400"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="200" cy="200" r="170" fill="url(#glow)"/>

  <!-- Hexagon frame (scaled and centered within 400x400) -->
  <g transform="translate(72 72) scale(1.0)">
    <path d="M128 28 L216 80 L216 176 L128 228 L40 176 L40 80 Z"
          stroke="url(#hexStroke)" stroke-width="5" stroke-linejoin="round"
          fill="#0F172A" fill-opacity="0.5"/>
    <path d="M128 48 L198 89 L198 167 L128 208 L58 167 L58 89 Z"
          stroke="#F8FAFC" stroke-opacity="0.08" stroke-width="1" fill="none"/>

    <!-- "E" bars -->
    <rect x="80" y="84" width="68" height="14" rx="3" fill="url(#brand)"/>
    <rect x="80" y="121" width="54" height="14" rx="3" fill="url(#brand)"/>
    <rect x="80" y="158" width="96" height="14" rx="3" fill="url(#brand)"/>
    <rect x="80" y="84" width="14" height="88" rx="3" fill="url(#brand)"/>

    <!-- Trend dot -->
    <circle cx="186" cy="91" r="7" fill="#FBBF24"/>
    <circle cx="186" cy="91" r="7" fill="none" stroke="#F8FAFC" stroke-opacity="0.45" stroke-width="1"/>
  </g>
</svg>
